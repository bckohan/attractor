name: Render DOT Diagrams

on:
  push:
    paths:
      - attractor-spec.md

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Graphviz
        run: sudo apt-get install -y graphviz

      - name: Render diagrams
        run: python3 .github/scripts/extract_dot.py attractor-spec.md diagrams/

      - name: Commit rendered SVGs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add diagrams/
          if git diff --cached --quiet; then
            echo "No diagram changes to commit."
          else
            git commit -m "chore: render DOT diagrams from attractor-spec.md [skip ci]"
            git push
          fi
